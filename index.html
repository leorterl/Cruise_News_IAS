<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עדכון יומי IAS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0e1117;
  --surface:  #161b25;
  --surface2: #1e2535;
  --border:   #2a3347;
  --text:     #e8edf5;
  --muted:    #6b7a99;
  --gold:     #f0b429;
  --gold-dim: rgba(240,180,41,0.12);
  --teal:     #22d3b8;
  --teal-dim: rgba(34,211,184,0.1);
  --red:      #f56565;
  --green:    #48bb78;
  --radius:   10px;
  --radius-sm:6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-logo {
  font-family: 'Syne', sans-serif;
  font-size: 1.15rem;
  font-weight: 800;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar-logo .dot { color: var(--gold); }

.topbar-key {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  max-width: 420px;
  margin: 0 auto;
}
.topbar-key label {
  font-size: 0.72rem;
  color: var(--muted);
  white-space: nowrap;
}
.topbar-key input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  color: var(--text);
  font-family: monospace;
  font-size: 0.75rem;
  direction: ltr;
  transition: border-color 0.2s;
}
.topbar-key input:focus { outline: none; border-color: var(--gold); }

.btn-save {
  padding: 6px 14px;
  background: var(--gold);
  color: #1a1200;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 0.75rem;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
}
.btn-save:hover { opacity: 0.85; }

.key-badge {
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
  background: var(--surface2);
  color: var(--muted);
}
.key-badge.ok { background: rgba(72,187,120,0.15); color: var(--green); }

/* ── Shell ── */
.shell {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ── Date sidebar ── */
.date-sidebar {
  width: 210px;
  min-width: 210px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
}

.sidebar-heading {
  font-size: 0.62rem;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 20px 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

.date-btn {
  display: flex;
  flex-direction: column;
  padding: 10px 20px;
  cursor: pointer;
  border: none;
  background: none;
  text-align: right;
  width: 100%;
  border-right: 3px solid transparent;
  transition: all 0.15s;
  gap: 2px;
}
.date-btn:hover { background: var(--surface2); }
.date-btn.active {
  background: var(--gold-dim);
  border-right-color: var(--gold);
}
.date-btn .day-label {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
}
.date-btn.active .day-label { color: var(--gold); }
.date-btn .day-sub {
  font-size: 0.68rem;
  color: var(--muted);
}
.date-btn .day-badge {
  font-size: 0.62rem;
  background: var(--teal-dim);
  color: var(--teal);
  padding: 1px 6px;
  border-radius: 10px;
  width: fit-content;
  margin-top: 2px;
}
.date-btn.unavailable { opacity: 0.35; cursor: default; }
.date-btn.unavailable:hover { background: none; }

/* ── Main content ── */
.main {
  flex: 1;
  padding: 32px 40px;
  overflow-y: auto;
  max-width: 960px;
}

.page-header {
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.page-date {
  font-family: 'Syne', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  line-height: 1.1;
}
.page-date span { color: var(--gold); }
.page-count {
  font-size: 0.78rem;
  color: var(--muted);
  background: var(--surface2);
  padding: 5px 12px;
  border-radius: 20px;
}

/* ── Story cards ── */
.stories { display: flex; flex-direction: column; gap: 16px; }

.story-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 20px;
  align-items: start;
  transition: border-color 0.2s, transform 0.15s;
  animation: fadeUp 0.3s ease both;
}
.story-card:hover {
  border-color: #3a4a66;
  transform: translateY(-1px);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.story-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  background: var(--gold-dim);
  color: var(--gold);
  border-radius: 50%;
  font-size: 0.65rem;
  font-weight: 700;
  margin-bottom: 10px;
}

.story-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 10px;
  cursor: pointer;
  transition: color 0.15s;
}
.story-title:hover { color: var(--gold); }

.story-summary {
  font-size: 0.86rem;
  line-height: 1.7;
  color: #9aa5be;
  margin-bottom: 14px;
}

.story-sources {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.source-chip {
  font-size: 0.65rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 3px 9px;
  border-radius: 20px;
  text-decoration: none;
  direction: ltr;
  transition: all 0.15s;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.source-chip:hover {
  background: var(--teal-dim);
  color: var(--teal);
  border-color: rgba(34,211,184,0.3);
}

.btn-write {
  white-space: nowrap;
  padding: 10px 18px;
  background: var(--gold);
  color: #1a1200;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 0.82rem;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-write:hover { opacity: 0.88; transform: scale(1.02); }
.btn-write:active { transform: scale(0.98); }
.btn-write:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; transform: none; }

/* ── Loading / empty ── */
.loading, .empty {
  text-align: center;
  padding: 80px 0;
  color: var(--muted);
}
.spinner {
  width: 36px;
  height: 36px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty h3 {
  font-family: 'Syne', sans-serif;
  font-size: 1.3rem;
  margin-bottom: 8px;
  color: var(--text);
}
.empty p { font-size: 0.85rem; }

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(5,8,15,0.85);
  z-index: 200;
  overflow-y: auto;
  padding: 40px 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; justify-content: center; align-items: flex-start; }

.modal {
  background: var(--surface);
  width: 100%;
  max-width: 820px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  animation: modalIn 0.2s ease;
}
@keyframes modalIn {
  from { transform: translateY(16px) scale(0.99); opacity: 0; }
  to   { transform: translateY(0)    scale(1);    opacity: 1; }
}

.modal-header {
  background: var(--surface2);
  padding: 18px 24px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
.modal-header-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  line-height: 1.35;
  flex: 1;
}
.modal-close {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--muted);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--red); color: white; border-color: var(--red); }

.modal-body { padding: 24px; }

/* ── Source links in modal ── */
.modal-sources {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 24px;
}
.modal-sources-label {
  font-size: 0.62rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.modal-source-link {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.78rem;
  color: var(--teal);
  text-decoration: none;
  padding: 4px 0;
  direction: ltr;
  transition: opacity 0.15s;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.modal-source-link:hover { opacity: 0.75; }
.modal-source-link::before { content: "↗"; font-size: 0.65rem; flex-shrink: 0; }

.modal-generating {
  text-align: center;
  padding: 50px 0;
  color: var(--muted);
}
.modal-generating .spinner { border-top-color: var(--teal); }

/* ── Article output ── */
.art-section { margin-bottom: 24px; }
.art-label {
  font-size: 0.62rem;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.titles-list { display: flex; flex-direction: column; gap: 8px; }
.title-opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: border-color 0.15s;
}
.title-opt:hover { border-color: #3a4a66; }
.title-opt span {
  flex: 1;
  font-family: 'Syne', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  line-height: 1.35;
}

.article-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  font-size: 0.84rem;
  line-height: 1.85;
  max-height: 340px;
  overflow-y: auto;
  white-space: pre-wrap;
  color: #b0bdd4;
  direction: rtl;
}

.field-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 0.83rem;
  color: #9aa5be;
}
.meta-count {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 6px;
}
.meta-count.warn { color: var(--red); }
.meta-count.ok   { color: var(--green); }

.btn-copy {
  padding: 4px 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 0.65rem;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.15s;
}
.btn-copy:hover { background: var(--surface2); color: var(--text); }
.btn-copy.copied { background: rgba(72,187,120,0.15); color: var(--green); border-color: rgba(72,187,120,0.3); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a4a66; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-logo">🚢 עדכון יומי <span class="dot">IAS</span></div>
  <div class="topbar-key">
    <label for="api-key">מפתח Gemini:</label>
    <input type="password" id="api-key" placeholder="AIza..." dir="ltr">
    <button class="btn-save" onclick="saveKey()">שמור</button>
    <span class="key-badge" id="key-badge">לא נשמר</span>
  </div>
</div>

<div class="shell">

  <!-- Date sidebar -->
  <nav class="date-sidebar">
    <div class="sidebar-heading">ארכיון</div>
    <div id="date-nav"></div>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <div class="page-date" id="page-date">טוען<span>...</span></div>
      <div class="page-count" id="page-count"></div>
    </div>
    <div id="stories-container">
      <div class="loading"><div class="spinner"></div>טוען חדשות...</div>
    </div>
  </main>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-title" id="modal-title">כותב כתבה...</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ── API Key ───────────────────────────────────────────────────────────────────

function loadKey() { return localStorage.getItem('gemini_api_key') || ''; }

function saveKey() {
  const val = document.getElementById('api-key').value.trim();
  if (!val) return;
  localStorage.setItem('gemini_api_key', val);
  setBadge(true);
}

function setBadge(saved) {
  const b = document.getElementById('key-badge');
  b.textContent = saved ? '✓ נשמר' : 'לא נשמר';
  b.className = 'key-badge' + (saved ? ' ok' : '');
}

function initKey() {
  const k = loadKey();
  if (k) { document.getElementById('api-key').value = k; setBadge(true); }
}

// ── Date helpers ──────────────────────────────────────────────────────────────

function dateStr(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.toISOString().split('T')[0];
}

function hebrewDayLabel(daysAgo) {
  if (daysAgo === 0) return 'היום';
  if (daysAgo === 1) return 'אתמול';
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  return d.toLocaleDateString('he-IL', { weekday: 'long' });
}

function shortDate(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleDateString('he-IL', { day: 'numeric', month: 'short' });
}

function fullDate(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

// ── Digest loading ────────────────────────────────────────────────────────────

const digestCache = {};

async function fetchDigest(iso) {
  if (digestCache[iso]) return digestCache[iso];
  const isToday = iso === dateStr(0);
  const url = isToday ? `./digest.json?t=${Date.now()}` : `./digest-${iso}.json`;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    digestCache[iso] = data;
    return data;
  } catch { return null; }
}

// ── Date nav ──────────────────────────────────────────────────────────────────

let activeDate = dateStr(0);
const availability = {};

async function buildDateNav() {
  const nav = document.getElementById('date-nav');
  nav.innerHTML = '';

  for (let i = 0; i <= 7; i++) {
    const iso = dateStr(i);
    const btn = document.createElement('button');
    btn.className = 'date-btn' + (iso === activeDate ? ' active' : '');
    btn.dataset.iso = iso;

    btn.innerHTML = `
      <span class="day-label">${hebrewDayLabel(i)}</span>
      <span class="day-sub">${shortDate(iso)}</span>
      <span class="day-badge" id="badge-${iso}">בודק...</span>`;

    btn.onclick = () => selectDate(iso);
    nav.appendChild(btn);

    // Check availability async
    fetchDigest(iso).then(data => {
      availability[iso] = !!data;
      const badge = document.getElementById(`badge-${iso}`);
      if (badge) {
        if (data?.items?.length) {
          badge.textContent = `${parseStories(data.summary, data.items).length} סיפורים`;
          badge.style.display = 'inline-block';
        } else {
          badge.style.display = 'none';
          btn.classList.add('unavailable');
        }
      }
    });
  }
}

function selectDate(iso) {
  activeDate = iso;
  document.querySelectorAll('.date-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.iso === iso);
  });
  loadAndRender(iso);
}

// ── Parse stories ─────────────────────────────────────────────────────────────

function parseStories(summaryText, rawItems) {
  if (!summaryText || summaryText === 'לא נמצאו חדשות חדשות היום.') return [];
  const blocks = summaryText.split(/(?=🚢)/g).filter(b => b.trim().startsWith('🚢'));

  return blocks.map((block, i) => {
    const lines = block.trim().split('\n').filter(l => l.trim());
    const title = lines[0].replace('🚢', '').replace(/\*/g, '').trim();
    const summaryLines = [], sourceLines = [];
    let inSources = false;

    for (let j = 1; j < lines.length; j++) {
      if (lines[j].includes('מקורות:')) { inSources = true; continue; }
      if (lines[j] === '---') continue;
      if (inSources) sourceLines.push(lines[j]);
      else summaryLines.push(lines[j]);
    }

    const sources = sourceLines
      .filter(l => l.includes('http'))
      .map(l => {
        const urlMatch = l.match(/https?:\/\/[^\s)]+/);
        const label = l.replace(/https?:\/\/[^\s)]+/, '').replace(/^[-–—\s*]+/, '').trim();
        return { label: label || 'קישור', url: urlMatch ? urlMatch[0] : '#' };
      });

    const related = rawItems.filter(item => sources.some(s => s.url === item.link));
    if (!related.length) related.push(...rawItems.slice(i * 2, i * 2 + 2));

    return { title, summary: summaryLines.join('\n').trim(), sources, related };
  });
}

// ── Render ────────────────────────────────────────────────────────────────────

let currentStories = [];

async function loadAndRender(iso) {
  const container = document.getElementById('stories-container');
  container.innerHTML = `<div class="loading"><div class="spinner"></div>טוען...</div>`;

  const digest = await fetchDigest(iso);

  const dateEl = document.getElementById('page-date');
  const countEl = document.getElementById('page-count');

  if (!digest) {
    dateEl.innerHTML = `${hebrewDayLabel(0)}<span> — אין נתונים</span>`;
    countEl.textContent = '';
    container.innerHTML = `<div class="empty"><h3>אין דיגסט לתאריך זה</h3><p>הדיגסט ייווצר אוטומטית בשעה 03:00.</p></div>`;
    return;
  }

  const parts = fullDate(digest.date).split(' ');
  const dayWord = parts[0];
  const rest = parts.slice(1).join(' ');
  dateEl.innerHTML = `${dayWord} <span>${rest}</span>`;

  currentStories = parseStories(digest.summary, digest.items || []);
  countEl.textContent = `${currentStories.length} סיפורים`;

  if (!currentStories.length) {
    container.innerHTML = `<div class="empty"><h3>לא נמצאו חדשות</h3><p>נסה תאריך אחר.</p></div>`;
    return;
  }

  container.innerHTML = currentStories.map((s, i) => `
    <div class="story-card" style="animation-delay:${i * 40}ms">
      <div>
        <div class="story-num">${i + 1}</div>
        <div class="story-title" onclick="openModal(${i})">${s.title}</div>
        <div class="story-summary">${s.summary}</div>
        <div class="story-sources">
          ${s.sources.map(src => `<a href="${src.url}" target="_blank" class="source-chip">${src.label.substring(0, 45)}</a>`).join('')}
        </div>
      </div>
      <button class="btn-write" onclick="openModal(${i})">✍️ כתוב כתבה</button>
    </div>`).join('');
}

// ── Article generation ────────────────────────────────────────────────────────

async function openModal(i) {
  const story = currentStories[i];
  if (!story) return;

  const apiKey = loadKey();
  if (!apiKey) { alert('נא להזין מפתח Gemini API בשורת הכלים למעלה.'); return; }

  document.getElementById('modal-title').textContent = story.title;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-generating">
      <div class="spinner"></div>
      <p style="margin-bottom:6px">Gemini כותב את הכתבה...</p>
      <p style="font-size:0.75rem;color:var(--muted)">כ-10 שניות</p>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');

  try {
    const result = await generateArticle(story, apiKey);
    renderArticle(result, story);
  } catch (e) {
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-generating">
        <p style="color:var(--red);margin-bottom:8px">❌ שגיאה: ${e.message}</p>
        <p style="font-size:0.75rem;color:var(--muted)">בדוק שהמפתח תקין ונסה שוב.</p>
      </div>`;
  }
}

async function generateArticle(story, apiKey) {
  const context = story.related.map(item =>
    `TITLE: ${item.title}\nSNIPPET: ${item.snippet || ''}\nURL: ${item.link}`
  ).join('\n\n');

  const prompt = `אתה כותב תוכן SEO מקצועי לאתר חדשות קרוזים בעברית.

בסיס הסיפור:
${story.title}

${story.summary}

${context ? `מקורות:\n${context}` : ''}

המשימה: צור תוכן בפורמט JSON בלבד — ללא markdown, ללא קוד, רק JSON גולמי:

{
  "titles": [
    "כותרת ראשונה — ממוקדת SEO",
    "כותרת שנייה — זווית שונה",
    "כותרת שלישית — יצירתית ומושכת"
  ],
  "article": "כתבה מלאה בעברית. כותרת H1, כותרות H2, פסקאות. לפחות 400 מילים. SEO מותאם לקרוזים.",
  "tags": "תג1, תג2, תג3, תג4, תג5",
  "meta": "תיאור מטא SEO עד 160 תווים בעברית"
}

חוקים: הכל בעברית. אל תצרף שום טקסט מחוץ ל-JSON.`;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
    })
  });

  if (!resp.ok) {
    const err = await resp.json();
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }

  const data = await resp.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

  try {
    const codeBlock = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (codeBlock) return JSON.parse(codeBlock[1].trim());
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (jsonMatch) return JSON.parse(jsonMatch[0]);
    return JSON.parse(text.trim());
  } catch {
    console.error('Raw Gemini response:', text);
    throw new Error('Gemini החזיר תגובה לא תקינה. פתח Console (F12) לפרטים.');
  }
}

function renderArticle(result, story) {
  const titlesHtml = (result.titles || []).map(t => `
    <div class="title-opt">
      <span>${t}</span>
      <button class="btn-copy" onclick="copyText(this,\`${esc(t)}\`)">העתק</button>
    </div>`).join('');

  const sourcesHtml = story.sources.length ? `
    <div class="modal-sources">
      <div class="modal-sources-label">מקורות מקוריים לאימות עובדות</div>
      ${story.sources.map(s => `<a href="${s.url}" target="_blank" class="modal-source-link">${s.url}</a>`).join('')}
    </div>` : '';

  const metaLen = (result.meta || '').length;

  document.getElementById('modal-body').innerHTML = `
    ${sourcesHtml}
    <div class="art-section">
      <div class="art-label">3 אפשרויות כותרת</div>
      <div class="titles-list">${titlesHtml}</div>
    </div>
    <div class="art-section">
      <div class="art-label">כתבה מלאה
        <button class="btn-copy" onclick="copyText(this,\`${esc(result.article||'')}\`)">העתק הכל</button>
      </div>
      <div class="article-box">${result.article || ''}</div>
    </div>
    <div class="art-section">
      <div class="art-label">תגיות
        <button class="btn-copy" onclick="copyText(this,\`${esc(result.tags||'')}\`)">העתק</button>
      </div>
      <div class="field-box">${result.tags || ''}</div>
    </div>
    <div class="art-section">
      <div class="art-label">Meta Description
        <button class="btn-copy" onclick="copyText(this,\`${esc(result.meta||'')}\`)">העתק</button>
      </div>
      <div class="field-box">
        ${result.meta || ''}
        <div class="meta-count ${metaLen > 160 ? 'warn' : 'ok'}">${metaLen} / 160 תווים ${metaLen > 160 ? '⚠️' : '✓'}</div>
      </div>
    </div>`;
}

// ── Utilities ─────────────────────────────────────────────────────────────────

function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$'); }

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ הועתק';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'העתק'; btn.classList.remove('copied'); }, 2000);
  });
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  initKey();
  buildDateNav();
  loadAndRender(activeDate);
}

init();
</script>
