<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עדכון יומי IAS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0e1117;
  --surface:  #161b25;
  --surface2: #1e2535;
  --border:   #2a3347;
  --text:     #e8edf5;
  --muted:    #6b7a99;
  --gold:     #f0b429;
  --gold-dim: rgba(240,180,41,0.12);
  --teal:     #22d3b8;
  --teal-dim: rgba(34,211,184,0.1);
  --red:      #f56565;
  --green:    #48bb78;
  --ias:      #3b82f6;
  --ias-dim:  rgba(59,130,246,0.12);
  --cin:      #a855f7;
  --cin-dim:  rgba(168,85,247,0.12);
  --radius:   10px;
  --radius-sm:6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

/* ── Top bar ── */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; gap: 20px; position: sticky; top: 0; z-index: 50; }
.topbar-logo { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 800; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
.topbar-logo .dot { color: var(--gold); }
.topbar-key { display: flex; align-items: center; gap: 8px; }
.topbar-key label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.topbar-key input { width: 260px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; color: var(--text); font-family: monospace; font-size: 0.75rem; direction: ltr; transition: border-color 0.2s; }
.topbar-key input:focus { outline: none; border-color: var(--gold); }
.btn-save { padding: 6px 14px; background: var(--gold); color: #1a1200; border: none; border-radius: var(--radius-sm); font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
.btn-save:hover { opacity: 0.85; }
.key-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; white-space: nowrap; background: var(--surface2); color: var(--muted); }
.key-badge.ok { background: rgba(72,187,120,0.15); color: var(--green); }
.btn-settings { padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-settings:hover { color: var(--text); border-color: #3a4a66; }

/* ── Shell ── */
.shell { display: flex; flex: 1; min-height: 0; }

/* ── Date sidebar ── */
.date-sidebar { width: 210px; min-width: 210px; background: var(--surface); border-left: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; gap: 2px; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
.sidebar-heading { font-size: 0.62rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); padding: 0 20px 12px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.date-btn { display: flex; flex-direction: column; padding: 10px 20px; cursor: pointer; border: none; background: none; text-align: right; width: 100%; border-right: 3px solid transparent; transition: all 0.15s; gap: 2px; }
.date-btn:hover { background: var(--surface2); }
.date-btn.active { background: var(--gold-dim); border-right-color: var(--gold); }
.date-btn .day-label { font-size: 0.82rem; font-weight: 600; color: var(--text); }
.date-btn.active .day-label { color: var(--gold); }
.date-btn .day-sub { font-size: 0.68rem; color: var(--muted); }
.date-btn .day-badge { font-size: 0.62rem; background: var(--teal-dim); color: var(--teal); padding: 1px 6px; border-radius: 10px; width: fit-content; margin-top: 2px; }
.date-btn.unavailable { opacity: 0.35; cursor: default; }
.date-btn.unavailable:hover { background: none; }

/* ── Main ── */
.main { flex: 1; padding: 32px 40px; overflow-y: auto; max-width: 960px; }
.page-header { margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; }
.page-date { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700; line-height: 1.1; }
.page-date span { color: var(--gold); }
.page-count { font-size: 0.78rem; color: var(--muted); background: var(--surface2); padding: 5px 12px; border-radius: 20px; }

/* ── Story cards ── */
.stories { display: flex; flex-direction: column; gap: 16px; }
.story-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: start; transition: border-color 0.2s, transform 0.15s; animation: fadeUp 0.3s ease both; }
.story-card:hover { border-color: #3a4a66; transform: translateY(-1px); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.story-num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; background: var(--gold-dim); color: var(--gold); border-radius: 50%; font-size: 0.65rem; font-weight: 700; margin-bottom: 10px; }
.story-title { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin-bottom: 10px; cursor: pointer; transition: color 0.15s; }
.story-title:hover { color: var(--gold); }
.story-summary { font-size: 0.86rem; line-height: 1.7; color: #9aa5be; margin-bottom: 14px; }
.story-sources { display: flex; flex-wrap: wrap; gap: 6px; }
.source-chip { font-size: 0.65rem; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 3px 9px; border-radius: 20px; text-decoration: none; direction: ltr; transition: all 0.15s; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.source-chip:hover { background: var(--teal-dim); color: var(--teal); border-color: rgba(34,211,184,0.3); }

/* ── Write button with site selector ── */
.write-group { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
.site-selector { display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.site-btn { padding: 5px 12px; background: var(--surface2); border: none; font-family: 'Outfit', sans-serif; font-size: 0.72rem; font-weight: 600; cursor: pointer; transition: all 0.15s; color: var(--muted); }
.site-btn.active-ias { background: var(--ias-dim); color: var(--ias); }
.site-btn.active-cin { background: var(--cin-dim); color: var(--cin); }
.site-btn:hover { color: var(--text); }
.btn-write { white-space: nowrap; padding: 10px 18px; background: var(--gold); color: #1a1200; border: none; border-radius: var(--radius-sm); font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.82rem; cursor: pointer; transition: opacity 0.15s, transform 0.1s; display: flex; align-items: center; gap: 6px; }
.btn-write:hover { opacity: 0.88; transform: scale(1.02); }
.btn-write:active { transform: scale(0.98); }

/* ── Loading / empty ── */
.loading, .empty { text-align: center; padding: 80px 0; color: var(--muted); }
.spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty h3 { font-family: 'Syne', sans-serif; font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }
.empty p { font-size: 0.85rem; }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(5,8,15,0.85); z-index: 200; overflow-y: auto; padding: 40px 20px; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; justify-content: center; align-items: flex-start; }
.modal { background: var(--surface); width: 100%; max-width: 820px; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.6); animation: modalIn 0.2s ease; }
@keyframes modalIn { from { transform: translateY(16px) scale(0.99); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
.modal-header { background: var(--surface2); padding: 18px 24px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); gap: 16px; }
.modal-header-left { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.modal-header-title { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; line-height: 1.35; }
.modal-site-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 0.68rem; font-weight: 600; padding: 2px 8px; border-radius: 10px; width: fit-content; }
.modal-site-tag.ias { background: var(--ias-dim); color: var(--ias); }
.modal-site-tag.cin { background: var(--cin-dim); color: var(--cin); }
.modal-close { background: var(--bg); border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.modal-close:hover { background: var(--red); color: white; border-color: var(--red); }
.modal-body { padding: 24px; }
.modal-sources { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 24px; }
.modal-sources-label { font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.modal-source-link { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--teal); text-decoration: none; padding: 4px 0; direction: ltr; transition: opacity 0.15s; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.modal-source-link:hover { opacity: 0.75; }
.modal-source-link::before { content: "↗"; font-size: 0.65rem; flex-shrink: 0; }
.modal-generating { text-align: center; padding: 50px 0; color: var(--muted); }
.modal-generating .spinner { border-top-color: var(--teal); }

/* ── Article output ── */
.art-section { margin-bottom: 24px; }
.art-label { font-size: 0.62rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--teal); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.titles-list { display: flex; flex-direction: column; gap: 8px; }
.title-opt { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: border-color 0.15s; }
.title-opt:hover { border-color: #3a4a66; }
.title-opt span { flex: 1; font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 700; line-height: 1.35; }
.article-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; font-size: 0.84rem; line-height: 1.85; max-height: 360px; overflow-y: auto; white-space: pre-wrap; color: #b0bdd4; direction: rtl; }
.field-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 0.83rem; color: #9aa5be; }
.meta-count { font-size: 0.7rem; color: var(--muted); margin-top: 6px; }
.meta-count.warn { color: var(--red); }
.meta-count.ok   { color: var(--green); }
.btn-copy { padding: 4px 10px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'Outfit', sans-serif; font-size: 0.65rem; cursor: pointer; color: var(--muted); transition: all 0.15s; }
.btn-copy:hover { background: var(--surface2); color: var(--text); }
.btn-copy.copied { background: rgba(72,187,120,0.15); color: var(--green); border-color: rgba(72,187,120,0.3); }

/* ── Settings panel ── */
.settings-overlay { display: none; position: fixed; inset: 0; background: rgba(5,8,15,0.85); z-index: 300; padding: 40px; backdrop-filter: blur(4px); }
.settings-overlay.open { display: flex; justify-content: center; align-items: flex-start; }
.settings-panel { background: var(--surface); width: 100%; max-width: 620px; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.6); }
.settings-header { background: var(--surface2); padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.settings-header h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
.settings-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.settings-field label { display: block; font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.settings-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; color: var(--text); font-family: monospace; font-size: 0.78rem; direction: ltr; }
.settings-field input:focus { outline: none; border-color: var(--gold); }
.settings-field textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.82rem; direction: rtl; resize: vertical; min-height: 90px; line-height: 1.6; }
.settings-field textarea:focus { outline: none; border-color: var(--gold); }
.settings-field .field-note { font-size: 0.7rem; color: var(--muted); margin-top: 5px; }
.settings-site-label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.settings-site-dot { width: 8px; height: 8px; border-radius: 50%; }
.settings-site-dot.ias { background: var(--ias); }
.settings-site-dot.cin { background: var(--cin); }
.settings-save-row { display: flex; justify-content: flex-end; gap: 10px; padding-top: 4px; border-top: 1px solid var(--border); }
.btn-cancel { padding: 8px 16px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 0.8rem; cursor: pointer; }
.btn-primary { padding: 8px 20px; background: var(--gold); color: #1a1200; border: none; border-radius: var(--radius-sm); font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.8rem; cursor: pointer; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a4a66; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-logo">🚢 עדכון יומי <span class="dot">IAS</span></div>
  <div class="topbar-key">
    <label for="api-key">מפתח Gemini:</label>
    <input type="password" id="api-key" placeholder="AIza..." dir="ltr">
    <button class="btn-save" onclick="saveKey()">שמור</button>
    <span class="key-badge" id="key-badge">לא נשמר</span>
  </div>
  <button class="btn-settings" onclick="openSettings()">⚙️ הגדרות סיומות</button>
</div>

<div class="shell">
  <!-- Date sidebar -->
  <nav class="date-sidebar">
    <div class="sidebar-heading">ארכיון</div>
    <div id="date-nav"></div>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <div class="page-date" id="page-date">טוען<span>...</span></div>
      <div class="page-count" id="page-count"></div>
    </div>
    <div id="stories-container">
      <div class="loading"><div class="spinner"></div>טוען חדשות...</div>
    </div>
  </main>
</div>

<!-- Article modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-header-title" id="modal-title">כותב כתבה...</div>
        <div class="modal-site-tag" id="modal-site-tag"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Settings panel -->
<div class="settings-overlay" id="settings-overlay" onclick="handleSettingsOverlay(event)">
  <div class="settings-panel">
    <div class="settings-header">
      <h2>⚙️ הגדרות</h2>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-body">
      <div class="settings-field">
        <label>מפתח Gemini API</label>
        <input type="password" id="s-apikey" placeholder="AIza..." dir="ltr">
      </div>
      <div class="settings-field">
        <div class="settings-site-label"><div class="settings-site-dot ias"></div><label style="margin:0">סיומת כתבה — IAS</label></div>
        <textarea id="s-ias-ending" placeholder="הכנס כאן את נוסח הסיומת של IAS..."></textarea>
        <div class="field-note">הטקסט שיצורף בסוף כל כתבה שתיצור לאתר IAS</div>
      </div>
      <div class="settings-field">
        <div class="settings-site-label"><div class="settings-site-dot cin"></div><label style="margin:0">סיומת כתבה — CruiseIn</label></div>
        <textarea id="s-cin-ending" placeholder="הכנס כאן את נוסח הסיומת של CruiseIn..."></textarea>
        <div class="field-note">הטקסט שיצורף בסוף כל כתבה שתיצור לאתר CruiseIn</div>
      </div>
      <div class="settings-save-row">
        <button class="btn-cancel" onclick="closeSettings()">ביטול</button>
        <button class="btn-primary" onclick="saveSettings()">שמור הגדרות</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Default endings ───────────────────────────────────────────────────────────
const DEFAULT_IAS_ENDING = `הצטרפו לקבוצת הוואטסאפ: IAS – חדשות ועדכוני תיירות מהארץ ומהעולם
https://chat.whatsapp.com/H9cw6nMoqtaFb5SiAkBSFB?mode=ems_copy_t

חפשו אותנו גם בטלגרם
https://t.me/IASMagat`;

const DEFAULT_CIN_ENDING = `ברוכים המצטרפים לקבוצת הפייסבוק ״קרוז חלום של הפלגה״ – הייחודית בעולם הקרוזים. למעלה מ-16,000 חברים
הצטרפו לקבוצת הוואטסאפ "קרוז אין-חדשות חמות מהים"
חפשו אותנו גם בטלגרם`;

// ── Storage ───────────────────────────────────────────────────────────────────
function loadKey()       { return localStorage.getItem('gemini_api_key') || ''; }
function loadIasEnding() { return localStorage.getItem('ias_ending') || DEFAULT_IAS_ENDING; }
function loadCinEnding() { return localStorage.getItem('cin_ending') || DEFAULT_CIN_ENDING; }

function saveKey() {
  const val = document.getElementById('api-key').value.trim();
  if (!val) return;
  localStorage.setItem('gemini_api_key', val);
  setBadge(true);
}
function setBadge(ok) {
  const b = document.getElementById('key-badge');
  b.textContent = ok ? '✓ נשמר' : 'לא נשמר';
  b.className = 'key-badge' + (ok ? ' ok' : '');
}
function initKey() {
  const k = loadKey();
  if (k) { document.getElementById('api-key').value = k; setBadge(true); }
}

// ── Settings panel ────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('s-apikey').value = loadKey();
  document.getElementById('s-ias-ending').value = loadIasEnding();
  document.getElementById('s-cin-ending').value = loadCinEnding();
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() { document.getElementById('settings-overlay').classList.remove('open'); }
function handleSettingsOverlay(e) { if (e.target === document.getElementById('settings-overlay')) closeSettings(); }
function saveSettings() {
  const key = document.getElementById('s-apikey').value.trim();
  if (key) { localStorage.setItem('gemini_api_key', key); document.getElementById('api-key').value = key; setBadge(true); }
  localStorage.setItem('ias_ending', document.getElementById('s-ias-ending').value);
  localStorage.setItem('cin_ending', document.getElementById('s-cin-ending').value);
  closeSettings();
  alert('ההגדרות נשמרו ✓');
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function dateStr(daysAgo) { const d = new Date(); d.setDate(d.getDate() - daysAgo); return d.toISOString().split('T')[0]; }
function hebrewDayLabel(daysAgo) {
  if (daysAgo === 0) return 'היום';
  if (daysAgo === 1) return 'אתמול';
  const d = new Date(); d.setDate(d.getDate() - daysAgo);
  return d.toLocaleDateString('he-IL', { weekday: 'long' });
}
function shortDate(iso) { return new Date(iso).toLocaleDateString('he-IL', { day: 'numeric', month: 'short' }); }
function fullDate(iso) { return new Date(iso).toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); }

// ── Digest loading ────────────────────────────────────────────────────────────
const digestCache = {};
async function fetchDigest(iso) {
  if (digestCache[iso]) return digestCache[iso];
  const url = iso === dateStr(0) ? `./digest.json?t=${Date.now()}` : `./digest-${iso}.json`;
  try { const r = await fetch(url); if (!r.ok) return null; const d = await r.json(); digestCache[iso] = d; return d; }
  catch { return null; }
}

// ── Date nav ──────────────────────────────────────────────────────────────────
let activeDate = dateStr(0);
async function buildDateNav() {
  const nav = document.getElementById('date-nav');
  nav.innerHTML = '';
  for (let i = 0; i <= 7; i++) {
    const iso = dateStr(i);

// ── Parse stories ─────────────────────────────────────────────────────────────
function parseStories(summaryText, rawItems) {
  if (!summaryText || summaryText === 'לא נמצאו חדשות חדשות היום.') return [];
  const blocks = summaryText.split(/(?=🚢)/g).filter(b => b.trim().startsWith('🚢'));
  return blocks.map((block, i) => {
    const lines = block.trim().split('\n').filter(l => l.trim());
    const title = lines[0].replace('🚢', '').replace(/\*/g, '').trim();
    const summaryLines = [], sourceLines = [];
    let inSources = false;
    for (let j = 1; j < lines.length; j++) {
      if (lines[j].includes('מקורות:')) { inSources = true; continue; }
      if (lines[j] === '---') continue;
      if (inSources) sourceLines.push(lines[j]);
      else summaryLines.push(lines[j]);
    }
    const sources = sourceLines.filter(l => l.includes('http')).map(l => {
      const urlMatch = l.match(/https?:\/\/[^\s)]+/);
      const label = l.replace(/https?:\/\/[^\s)]+/, '').replace(/^[-–—\s*]+/, '').trim();
      return { label: label || 'קישור', url: urlMatch ? urlMatch[0] : '#' };
    });
    const related = rawItems.filter(item => sources.some(s => s.url === item.link));
    if (!related.length) related.push(...rawItems.slice(i * 2, i * 2 + 2));
    return { title, summary: summaryLines.join('\n').trim(), sources, related };
  });
}

## עקרונות הכתיבה שלך

**מבנה:**
- כותרת: דרמטית + נקודתיים + עובדה ספציפית (דוגמה: "היסטוריה בלב ים: ויקינג משיקה את הספינה הראשונה בעולם המונעת במימן")
- תת-כותרת (deck): משפט אחד שמסכם את כל הסיפור — ספציפי, לא כללי
- פתיחה: מתחיל בעובדה מעניינת, הקשר, או נתון מספרי. לא "חברת X הודיעה היום"
- שמות חברות: **עברית (English)** בהזכרה ראשונה
- כותרות H2: קצרות, **מודגשות**
- ציטוטים: שם מלא ותפקיד של הדובר
- רשימות: נקודות לריבוי פריטים (יעדים, תכונות, מחירים)
- סיום: עובדה קדימה-מביטה ספציפית. לא "העתיד מבטיח"

**נשמה בכתיבה:**
- משפטים קצרים ומשפטים ארוכים — מגוון קצב
- תגובה אנושית לעובדות ("זה לא מעט", "שנה טובה לחברה", "שווה לשים לב")
- ספציפי תמיד: מספרים, תאריכים, שמות אוניות

**מה לא לעשות (חוקי אנטי-AI):**
- אסור: "אבן דרך", "מהלך זה", "צעד משמעותי", "בנוף המשתנה"

חוק ברזל: אל תוסיף שום טקסט מחוץ ל-JSON.`;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.75, maxOutputTokens: 3000 }
    })
  });

  if (!resp.ok) { const err = await resp.json(); throw new Error(err.error?.message || `HTTP ${resp.status}`); }
  const data = await resp.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

  try {
    const codeBlock = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (codeBlock) return JSON.parse(codeBlock[1].trim());
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (jsonMatch) return JSON.parse(jsonMatch[0]);
    return JSON.parse(text.trim());
  } catch {
    console.error('Raw Gemini response:', text);
    throw new Error('Gemini החזיר תגובה לא תקינה. פתח Console (F12) לפרטים.');
  }
}

// All copy text is stored in a Map keyed by button id — no inline onclick strings,
// which avoids GitHub Pages' strict Content Security Policy.
const copyStore = new Map();
let copyIdCounter = 0;

function makeCopyBtn(text, label = 'העתק') {
  const id = 'cp-' + (++copyIdCounter);
  copyStore.set(id, text);
  return `<button class="btn-copy" data-copy-id="${id}">${label}</button>`;
}

function renderArticle(result, story, ending) {
  const fullArticle = (result.article || '') + '\n\n' + ending;
  const metaLen = (result.meta || '').length;

  // Sources
  const sourcesDiv = document.createElement('div');
  if (story.sources.length) {
    sourcesDiv.className = 'modal-sources';

      story.sources.map(s => `<a href="${s.url}" target="_blank" class="modal-source-link">${s.url}</a>`).join('');
  }

  // Titles
  const titlesSection = document.createElement('div');
  titlesSection.className = 'art-section';

  const titlesList = document.createElement('div');
  titlesList.className = 'titles-list';
  (result.titles || []).forEach(t => {
    const row = document.createElement('div');
    row.className = 'title-opt';
    const span = document.createElement('span');
    span.textContent = t;
    row.appendChild(span);
    const btn = document.createElement('button');
    btn.className = 'btn-copy';
    btn.textContent = 'העתק';
    btn.addEventListener('click', () => doCopy(btn, t));
    row.appendChild(btn);
    titlesList.appendChild(row);
  });
  titlesSection.appendChild(titlesList);

  // Deck
  const deckSection = document.createElement('div');
  if (result.deck) {
    deckSection.className = 'art-section';
    const label = document.createElement('div');
    label.className = 'art-label';
    label.textContent = 'תת-כותרת (Deck)';
    const copyBtn = document.createElement('button');
    copyBtn.className = 'btn-copy';
    copyBtn.textContent = 'העתק';
    copyBtn.addEventListener('click', () => doCopy(copyBtn, result.deck));
    label.appendChild(copyBtn);
    const box = document.createElement('div');
    box.className = 'field-box';
    box.textContent = result.deck;
    deckSection.appendChild(label);
    deckSection.appendChild(box);
  }

  // Full article
  const articleSection = document.createElement('div');
  articleSection.className = 'art-section';
  const articleLabel = document.createElement('div');
  articleLabel.className = 'art-label';
  articleLabel.textContent = 'כתבה מלאה (כולל סיומת)';
  const articleCopyBtn = document.createElement('button');
  articleCopyBtn.className = 'btn-copy';
  articleCopyBtn.textContent = 'העתק הכל';
  articleCopyBtn.addEventListener('click', () => doCopy(articleCopyBtn, fullArticle));
  articleLabel.appendChild(articleCopyBtn);
  const articleBox = document.createElement('div');
  articleBox.className = 'article-box';
  articleBox.textContent = fullArticle;
  articleSection.appendChild(articleLabel);
  articleSection.appendChild(articleBox);

  // Tags
  const tagsSection = document.createElement('div');
  tagsSection.className = 'art-section';
  const tagsLabel = document.createElement('div');
  tagsLabel.className = 'art-label';
  tagsLabel.textContent = 'תגיות';
  const tagsCopyBtn = document.createElement('button');
  tagsCopyBtn.className = 'btn-copy';
  tagsCopyBtn.textContent = 'העתק';
  tagsCopyBtn.addEventListener('click', () => doCopy(tagsCopyBtn, result.tags || ''));
  tagsLabel.appendChild(tagsCopyBtn);
  const tagsBox = document.createElement('div');
  tagsBox.className = 'field-box';
  tagsBox.textContent = result.tags || '';
  tagsSection.appendChild(tagsLabel);
  tagsSection.appendChild(tagsBox);

  // Meta
  const metaSection = document.createElement('div');
  metaSection.className = 'art-section';
  const metaLabel = document.createElement('div');
  metaLabel.className = 'art-label';
  metaLabel.textContent = 'Meta Description';
  const metaCopyBtn = document.createElement('button');

  metaCopyBtn.textContent = 'העתק';
  metaCopyBtn.addEventListener('click', () => doCopy(metaCopyBtn, result.meta || ''));
  metaLabel.appendChild(metaCopyBtn);
  const metaBox = document.createElement('div');
  metaBox.className = 'field-box';
  metaBox.textContent = result.meta || '';
  const metaCount = document.createElement('div');
  metaCount.className = 'meta-count ' + (metaLen > 155 ? 'warn' : 'ok');
  metaCount.textContent = `${metaLen} / 155 תווים ${metaLen > 155 ? '⚠️' : '✓'}`;
  metaBox.appendChild(metaCount);
  metaSection.appendChild(metaLabel);
  metaSection.appendChild(metaBox);

  // Assemble
  body.innerHTML = '';
  if (story.sources.length) body.appendChild(sourcesDiv);
  body.appendChild(titlesSection);
  if (result.deck) body.appendChild(deckSection);
  body.appendChild(articleSection);
  body.appendChild(tagsSection);

}

function doCopy(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ הועתק'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'העתק'; btn.classList.remove('copied'); }, 2000);
  });
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
